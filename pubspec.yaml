name: notifica_asada
description: "Avance I — consulta de solicitudes de voluntariado y notificaciones (curso NotificaASADA / plataformas móviles)."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # HTTP existente (lo mantenemos por compatibilidad con ApiService legacy).
  http: ^1.2.2

  # Auth stack
  dio: ^5.7.0
  flutter_riverpod: ^2.5.1
  hooks_riverpod: ^2.5.1
  flutter_hooks: ^0.20.5
  go_router: ^14.6.2
  flutter_secure_storage: ^9.2.2

  # Legacy
  provider: ^6.1.2
  firebase_core: ^3.8.1
  firebase_messaging: ^15.1.6

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
